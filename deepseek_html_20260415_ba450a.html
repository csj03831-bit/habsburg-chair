                ja: ["ヴァレンシュタインは留任。戦闘に勝利するも背後で交渉。戦争+14年。", "暗殺者によりヴァレンシュタイン殺害。戦争+14年。", "ヴァレンシュタインを解雇。スウェーデン王に軍を粉砕される。戦争+14年。"] },
            warExt: [14,14,14]
        },
        { // Chapter 3: Ferdinand III, 1648 Peace
            monarch: "Ferdinand III",
            year: "1648",
            bgImg: "https://th.bing.com/th/id/R.cbd0bc0c7dddfdfaed16181e150d664e?rik=hQAulekTtKb%2bHw&pid=ImgRaw&r=0",
            mainTitle: { en: "🕊️ CHAPTER 3: FERDINAND III · THE EXHAUSTED EMPIRE", 'zh-CN': "🕊️ 第3章：斐迪南三世 · 疲惫的帝国", 'zh-TW': "🕊️ 第3章：斐迪南三世 · 疲憊的帝國", es: "🕊️ CAPÍTULO 3: FERNANDO III · EL IMPERIO AGOTADO", ja: "🕊️ 第3章：フェルディナント3世 · 疲弊した帝国" },
            roleDesc: { en: "Emperor Ferdinand III. You inherited a war that has consumed Europe for three decades. Eight million dead. Your people beg for peace.", 'zh-CN': "皇帝斐迪南三世。你继承了一场吞噬欧洲三十年的战争。八百万人死亡。你的人民恳求和平。", 'zh-TW': "皇帝斐迪南三世。你繼承了一場吞噬歐洲三十年的戰爭。八百萬人死亡。你的人民懇求和平。", es: "Emperador Fernando III. Heredaste una guerra que ha consumido Europa durante tres décadas.", ja: "神聖ローマ皇帝フェルディナント3世。欧州を30年消耗させた戦争を継承した。" },

                'zh-CN': ["威斯特伐利亚和约结束了战争。杀戮停止。（额外0年）", "你继续战斗。法国和瑞典要求更苛刻的条款。战争+5年。", "你撕毁了条约。法国和瑞典再次入侵。战争+6年。"],
                'zh-TW': ["威斯特伐利亞和約結束了戰爭。殺戮停止。（額外0年）", "你繼續戰鬥。法國和瑞典要求更苛刻的條款。戰爭+5年。", "你撕毀了條約。法國和瑞典再次入侵。戰爭+6年。"],
                es: ["La Paz de Westfalia terminó la guerra. (0 años)", "Seguiste luchando. Guerra +5 años.", "Rompiste el tratado. Guerra +6 años."],
                ja: ["ヴェストファーレン条約が戦争を終結。（0年）", "戦闘継続。戦争+5年。", "条約を破棄。戦争+6年。"] },
            warExt: [0,5,6]

    const WAR_IMG = "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Battle_of_Lützen_1632.jpg/800px-Battle_of_Lützen_1632.jpg";
    const PEACE_IMG = "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Peace_of_Westphalia%2C_Munster.jpg/800px-Peace_of_Westphalia%2C_Munster.jpg";

    let currentChapterIdx = 0;
    let decisions = [];
    let gameActive = false;
    const dynamicDiv = document.getElementById('dynamicContent');

    function renderStartScreen() {
        let html = `<div class="start-screen">
            <div style="font-size:1.2rem; margin-bottom:1rem;">${t('intro_text')}</div>
            <button id="startGameBtn" class="start-btn">${t('start_game')}</button>
        </div>`;
        dynamicDiv.innerHTML = html;
        document.getElementById('startGameBtn')?.addEventListener('click', () => {
            currentChapterIdx = 0;
            decisions = [];
            gameActive = true;
            renderTitlePage();
        });
    }

    function renderTitlePage() {
        if (!gameActive || currentChapterIdx >= CHAPTERS.length) {
            if (currentChapterIdx >= CHAPTERS.length) renderConsequences();
            return;
        }
        const ch = CHAPTERS[currentChapterIdx];
        const titleText = ch.mainTitle[currentLang] || ch.mainTitle.en;
        let html = `<div class="title-page">
            <div class="chapter-main-title">${titleText}</div>
            <button id="nextToSceneBtn" class="proceed-btn">${t('proceed_to_choices')}</button>
        </div>`;
        dynamicDiv.innerHTML = html;
        document.getElementById('nextToSceneBtn')?.addEventListener('click', () => { renderScenePage(); });
    }

    function renderScenePage() {
        if (!gameActive || currentChapterIdx >= CHAPTERS.length) return;
        const ch = CHAPTERS[currentChapterIdx];
        const roleText = ch.roleDesc[currentLang] || ch.roleDesc.en;
        const situationText = ch.situation[currentLang] || ch.situation.en;
        let html = `<div class="scene-page">
            <div class="cinematic-bg"><img src="${ch.bgImg}" alt="Historical scene" onerror="this.style.opacity='0.3'"></div>
            <div class="situation-card">
                <div class="role-line">👑 Your Role: ${roleText}</div>
                <div class="situation-text">${situationText}</div>
            </div>
            <button id="proceedToOptionsBtn" class="proceed-btn">${t('proceed_to_choices')}</button>
        </div>`;
        dynamicDiv.innerHTML = html;
        document.getElementById('proceedToOptionsBtn')?.addEventListener('click', () => { renderOptionsPage(); });
    }

    function renderOptionsPage() {
        if (!gameActive || currentChapterIdx >= CHAPTERS.length) return;
        const ch = CHAPTERS[currentChapterIdx];
        let html = `<div class="options-page"><div class="options-grid">`;
        ch.options.forEach((opt, idx) => {
            html += `<div class="option-btn" data-opt-idx="${idx}">
                <div class="option-icon">${opt.icon}</div>
                <div class="option-text">
                    <strong>${opt.title[currentLang] || opt.title.en}</strong><br>
                    <span class="option-desc">${opt.desc[currentLang] || opt.desc.en}</span>
                </div>
            </div>`;
        });
        html += `</div></div>`;
        dynamicDiv.innerHTML = html;
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', (e) => { if (gameActive) handleChapterDecision(parseInt(btn.dataset.optIdx)); });
        });
    }

    function handleChapterDecision(choiceIdx) {
        if (!gameActive) return;
        const ch = CHAPTERS[currentChapterIdx];
        const outcomeText = (ch.outcomes[currentLang] || ch.outcomes.en)[choiceIdx];
        let extension = 0;
        if (Array.isArray(ch.warExt)) extension = ch.warExt[choiceIdx];
        const chosenTitle = (ch.options[choiceIdx].title[currentLang] || ch.options[choiceIdx].title.en);
        decisions.push({
            year: ch.year,
            monarch: ch.monarch,
            choice: chosenTitle,
            outcome: outcomeText,
            extension: extension
        });
        const outcomeImg = (chosenTitle.includes("peace") || chosenTitle.includes("Peace") || chosenTitle.includes("Hear") || chosenTitle.includes("Share")) ? PEACE_IMG : WAR_IMG;
        let extra = extension > 0 ? ` ⏳ War prolonged +${extension} years.` : (extension === 0 && currentChapterIdx > 0 ? ` ✨ This choice reduced suffering.` : '');
        let nextBtnText = (currentChapterIdx === CHAPTERS.length-1) ? t('view_final') : t('continue_next');
        let html = `<div class="outcome-full-page">
            <img class="outcome-img" src="${outcomeImg}" onerror="this.style.display='none'">
            <div style="font-size:2rem;text-align:center;">📜⚜️</div>
            <h3 style="font-family:Cinzel;text-align:center;">${ch.year} · ${t('your_verdict')}</h3>
            <p style="margin:1rem 0;font-size:1.05rem;"><strong>“${chosenTitle}”</strong></p>
            <p>${outcomeText}</p>
            <p style="margin-top:12px;font-style:italic;">${extra}</p>
        </div>
        <div class="flex-buttons">
            <button id="nextChapterBtn" class="next-btn">${nextBtnText}</button>
            <button id="restartBtn" class="restart-btn">${t('restart_btn')}</button>
        </div>`;
        dynamicDiv.innerHTML = html;
        document.getElementById('nextChapterBtn')?.addEventListener('click', () => {
            currentChapterIdx++;
            if (currentChapterIdx < CHAPTERS.length) renderTitlePage();
            else renderConsequences();
        });
        document.getElementById('restartBtn')?.addEventListener('click', resetToStart);
    }

    function renderConsequences() {
        gameActive = false;
        let totalExt = decisions.reduce((sum, d) => sum + (d.extension || 0), 0);
        let html = `<div class="consequences-wall"><h3 style="text-align:center;">📜 CONSEQUENCES WALL</h3><div style="text-align:center;">Your decisions across the Habsburg dynasty</div>`;
        for(let d of decisions) {
            html += `<div class="timeline-item">
                <div class="year">${d.year}</div>
                <div class="decision"><strong>${d.monarch}: ${d.choice}</strong></div>
                <div class="consequence">${d.outcome}${d.extension>0?` +${d.extension} yrs`:''}</div>
            </div>`;
        }
        html += `<hr><div style="padding:12px;"><strong>Total war prolongation: +${totalExt} years.</strong><br><em>“Martin Luther nailed the 95 theses. Eight million people died. Could any have stopped it?”</em></div></div>`;
        
        // 生成邮件和链接分享区域
        let summaryText = `HABSBURG CHAIR RESULTS\n\n` + decisions.map(d => `${d.year} (${d.monarch}): ${d.choice}\n→ ${d.outcome}`).join('\n\n') + `\n\nTotal war prolongation: +${totalExt} years.`;
        let encodedSummary = encodeURIComponent(summaryText);
        let mailtoLink = `mailto:?subject=My Habsburg Chair Decisions&body=${encodedSummary}`;
        
        html += `<div class="share-section">
            <a href="${mailtoLink}" class="email-btn" style="text-decoration:none; display:inline-flex; align-items:center; gap:8px;"><span class="email-icon">📧</span> ${t('email_results')}</a>
            <button id="copyLinkBtn" class="link-copy-btn"><span class="copy-icon">🔗</span> ${t('copy_link')}</button>
        </div>
        <div class="flex-buttons"><button id="finalRestart" class="restart-btn">${t('restart_btn')}</button></div>`;
        dynamicDiv.innerHTML = html;
        document.getElementById('finalRestart')?.addEventListener('click', resetToStart);
        document.getElementById('copyLinkBtn')?.addEventListener('click', () => {
            let resultUrl = window.location.href.split('#')[0] + '#results=' + btoa(JSON.stringify(decisions.map(d=>({year:d.year, monarch:d.monarch, choice:d.choice}))));
            navigator.clipboard.writeText(resultUrl);
            alert("Results link copied to clipboard! You can share this link.");
        });
    }

    function resetToStart() {
        currentChapterIdx = 0;
        decisions = [];
        gameActive = false;
        renderStartScreen();
    }

    document.getElementById('languageSwitcher').addEventListener('change', (e) => {
        currentLang = e.target.value;
        if (gameActive === false && currentChapterIdx === 0 && decisions.length === 0) renderStartScreen();
        else if (gameActive === true && currentChapterIdx < CHAPTERS.length) renderTitlePage();
        else if (decisions.length > 0 && currentChapterIdx >= CHAPTERS.length) renderConsequences();
        else renderStartScreen();
    });
    
    renderStartScreen();
</script>
</body>
</html>
